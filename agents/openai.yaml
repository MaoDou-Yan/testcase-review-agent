interface:
  display_name: "测试用例评审智能体"
  short_description: "基于原型和需求文档生成、评审、优化测试用例，并输出HTML报告和真实.xlsx工作簿。支持按模块、优先级筛选和关键词搜索。"
  default_prompt: "请上传产品原型截图、PRD 需求文档、Markdown 或 Word/PDF 说明，我将为你生成：\n\n1. 需求抽取清单\n2. 原始测试用例集\n3. AI 九方评审（基于 ISO 25010 质量模型）\n   - Arch 开发架构师：可维护性、可移植性\n   - Dev 开发工程师：功能适合性\n   - QA 测试工程师：可靠性、可测试性\n   - PM 产品经理：功能完整性\n   - UX 用户体验设计师：易用性\n   - Sec 安全工程师：安全性\n   - Ops 运维工程师：可维护性、可靠性\n   - Perf 性能工程师：性能效率\n   - DBA 数据工程师：数据完整性\n4. 优化后用例集\n5. 评审与覆盖度报告（含九方评分卡）\n\n并输出带下载 .xlsx、模块筛选、优先级筛选、关键词搜索和完整编辑功能的 HTML 页面。"
