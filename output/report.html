      --bg-card: #111827;
      --bg-elevated: #1a2035;
      --bg-hover: #1e2a45;
      --text: #e2e8f0;
      --text-muted: #8892a8;
      --text-bright: #f8fafc;
      --border: #1e293b;
      --border-glow: rgba(59,130,246,0.15);
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.25);
      --cyan: #06b6d4;
      --purple: #8b5cf6;
      --green: #10b981;
      --red: #ef4444;
      --amber: #f59e0b;
      --yellow: #eab308;
      --p0-bg: rgba(239,68,68,0.15);
      --p0-text: #fca5a5;
      --p1-bg: rgba(245,158,11,0.15);
      --p1-text: #fcd34d;
      --p2-bg: rgba(234,179,8,0.15);
      --p2-text: #fde68a;
      --p3-bg: rgba(100,116,139,0.15);
      --p3-text: #94a3b8;
      --edit-bg: rgba(245,158,11,0.1);
      --edit-border: #f59e0b;
      --new-row: rgba(16,185,129,0.1);
      --del-row: rgba(239,68,68,0.1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      background-image:
        radial-gradient(circle at 25% 25%, rgba(59,130,246,0.03) 0%, transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(139,92,246,0.03) 0%, transparent 50%);
    }

    /* ── Header ── */
    header {
      padding: 28px 36px 20px;
      background: linear-gradient(135deg, #0f1629 0%, #1a1040 50%, #0d1b3e 100%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--purple), transparent);
    }
    h1 { margin: 0 0 6px; font-size: 24px; font-weight: 700; color: var(--text-bright); }
    .sub { color: var(--text-muted); font-size: 13px; }
    .edit-badge {
      display: none;
      align-items: center;
      gap: 6px;
      background: rgba(245,158,11,0.12);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: #fcd34d;
      font-weight: 600;
      backdrop-filter: blur(8px);
    }
    .edit-badge.visible { display: flex; }
    .edit-dot {
      width: 8px; height: 8px;
      background: #f59e0b;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Main ── */
    main { padding: 20px 36px 40px; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: center;
    }
    .toolbar-sep { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }

    /* ── Buttons ── */
    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      height: 34px;
      padding: 0 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      transition: all 0.2s ease;
      box-shadow: 0 0 12px rgba(59,130,246,0.2);
    }
    button:hover { box-shadow: 0 0 20px rgba(59,130,246,0.35); }
    button.secondary { background: transparent; color: var(--accent); border-color: rgba(59,130,246,0.4); box-shadow: none; }
    button.secondary:hover { background: rgba(59,130,246,0.1); box-shadow: none; }
    button.danger { background: transparent; color: #fca5a5; border-color: rgba(239,68,68,0.4); box-shadow: none; }
    button.danger:hover { background: rgba(239,68,68,0.1); box-shadow: none; }
    button.success { background: transparent; color: #6ee7b7; border-color: rgba(16,185,129,0.4); box-shadow: none; }
    button.success:hover { background: rgba(16,185,129,0.1); box-shadow: none; }
    button:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 0;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .tab {
      background: transparent;
      color: var(--text-muted);
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      height: 40px;
      padding: 0 18px;
      font-size: 14px;
      box-shadow: none;
      transition: all 0.2s ease;
    }
    .tab:hover { color: var(--text); background: rgba(255,255,255,0.03); box-shadow: none; }
    .tab.active {
      color: var(--text-bright);
      font-weight: 700;
      border-bottom-color: var(--accent);
      background: transparent;
      box-shadow: 0 2px 8px rgba(59,130,246,0.2);
    }

    /* ── Sections ── */
    section {
      display: none;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 0 0 12px 12px;
      padding: 20px;
      overflow: auto;
    }
    section.active { display: block; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      align-items: center;
    }
    .filter-bar label { font-size: 13px; color: var(--text-muted); }
    .filter-bar select, .filter-bar input[type="text"] {
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 10px;
      font-size: 13px;
      background: var(--bg-elevated);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .filter-bar select:focus, .filter-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(59,130,246,0.2);
    }
    .filter-count { font-size: 12px; color: var(--text-muted); }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
      font-size: 13px;
    }
    th, td {
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      vertical-align: top;
      text-align: left;
      line-height: 1.5;
    }
    th {
      background: var(--bg-elevated);
      color: var(--text-bright);
      font-weight: 700;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 1;
      user-select: none;
      border-bottom: 2px solid var(--border);
    }
    th.col-action { width: 64px; text-align: center; }
    td.col-action { text-align: center; vertical-align: middle; padding: 4px; white-space: nowrap; }

    tbody tr:nth-child(even) td { background: rgba(255,255,255,0.015); }
    tr:hover td:not(.col-action) {
      background: var(--bg-hover);
      box-shadow: inset 3px 0 0 var(--accent);
    }
    tr.row-new td { background: var(--new-row) !important; }
    tr.row-deleted td { background: var(--del-row) !important; opacity: .5; text-decoration: line-through; }
    tr.hidden { display: none; }

    /* ── Editable cell ── */
    td[contenteditable="true"] {
      outline: none;
      min-width: 60px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    td[contenteditable="true"]:focus {
      background: var(--edit-bg) !important;
      box-shadow: inset 0 0 0 2px var(--edit-border);
      border-radius: 2px;
    }
    td[contenteditable="true"]:empty::before {
      content: attr(data-placeholder);
      color: #475569;
      font-style: italic;
    }

    /* ── Priority badge ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge-p0 { background: var(--p0-bg); color: var(--p0-text); }
    .badge-p1 { background: var(--p1-bg); color: var(--p1-text); }
    .badge-p2 { background: var(--p2-bg); color: var(--p2-text); }
    .badge-p3 { background: var(--p3-bg); color: var(--p3-text); }

    /* ── Risk badge ── */
    .risk-high { background: var(--p0-bg); color: var(--p0-text); padding: 2px 8px; border-radius: 10px; font-weight: 700; font-size: 12px; }
    .risk-mid  { background: var(--p1-bg); color: var(--p1-text); padding: 2px 8px; border-radius: 10px; font-weight: 700; font-size: 12px; }
    .risk-low  { background: var(--p2-bg); color: var(--p2-text); padding: 2px 8px; border-radius: 10px; font-weight: 700; font-size: 12px; }

    /* ── Row action buttons ── */
    .btn-row {
      border: none;
      background: none;
      cursor: pointer;
      padding: 3px 5px;
      border-radius: 4px;
      font-size: 15px;
      height: auto;
      line-height: 1;
      box-shadow: none;
    }
    .btn-row:hover { background: rgba(255,255,255,0.08); }
    .btn-row.del { color: #f87171; }
    .btn-row.restore { color: #6ee7b7; }

    /* ── Metrics ── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .metric {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      background: var(--bg-elevated);
      transition: all 0.2s ease;
    }
    .metric:hover {
      border-color: rgba(59,130,246,0.3);
      box-shadow: 0 0 16px rgba(59,130,246,0.08);
    }
    .metric span { color: var(--text-muted); font-size: 13px; }
    .metric strong {
      display: block;
      font-size: 28px;
      margin-top: 6px;
      color: var(--cyan);
      font-weight: 700;
    }
    .metric.good strong { color: var(--green); }
    .metric.warn strong { color: var(--amber); }
    .metric .sub { color: var(--text-muted); font-size: 11px; margin-top: 4px; }

    /* ── Notice ── */
    .notice {
      margin: 16px 0;
      padding: 14px 16px;
      border-left: 3px solid var(--accent);
      background: rgba(59,130,246,0.08);
      border-radius: 0 8px 8px 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.7;
    }

    /* ── Score cards (report tab) ── */
    .score-card {
      text-align: center;
      padding: 20px 14px;
    }
    .score-card .role-name {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .score-card .score-value {
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      margin: 8px 0;
    }
    .score-card .score-detail {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      line-height: 1.5;
    }
    .score-high { color: var(--green); }
    .score-mid { color: var(--cyan); }
    .score-low { color: var(--amber); }

    /* ── Progress bar (coverage) ── */
    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 10px;
    }
    .progress-bar .fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--accent), var(--cyan));
      transition: width 0.6s ease;
    }

    /* ── Two-column report layout ── */
    .report-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 18px;
    }
    @media (max-width: 900px) {
      .report-grid-2 { grid-template-columns: 1fr; }
    }
    .report-grid-2 h3 { margin: 0 0 12px; font-size: 15px; color: var(--text-bright); }
    .report-grid-2 table { min-width: auto; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--bg-elevated);
      color: var(--text-bright);
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
      z-index: 9999;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #toast.show { opacity: 1; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a5568; }

    /* ── Section headings ── */
    h3 { color: var(--text-bright); }

    /* ── Print styles ── */
    @media print {
      :root {
        --bg: #ffffff;
        --bg-card: #ffffff;
        --bg-elevated: #f8f9fa;
        --text: #1a1a1a;
        --text-muted: #555;
        --text-bright: #000;
        --border: #ccc;
      }
      header { background: #fff; border-bottom: 2px solid #333; }
      header::after { display: none; }
      .toolbar, .edit-badge, .col-action { display: none !important; }
      .tab { border: 1px solid #ccc; }
      .tab.active { background: #e8e8e8; }
      table { font-size: 10px; }
      .badge-p0 { background: #fee; color: #c00; }
      .badge-p1 { background: #fff3e0; color: #e65100; }
      .badge-p2 { background: #fffde7; color: #f57f17; }
      .badge-p3 { background: #f5f5f5; color: #666; }
      body { background-image: none; }
    }

    /* ── Responsive table scroll ── */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    @media (max-width: 768px) {
      table { font-size: 12px; }
      th, td { padding: 6px 8px; white-space: nowrap; }
    }
  </style>

  <script>
  // ─────────────────────────────────────────────────────────────────────────
  // DATA (injected by Python or loaded from JSON)
  // ─────────────────────────────────────────────────────────────────────────
  const DATA = window.__REPORT_DATA__ || {};

  // ─────────────────────────────────────────────────────────────────────────
  // STATE
  // ─────────────────────────────────────────────────────────────────────────
  let editMode = false;
  let editCount = 0;
  const snapshots = {};

  // ─────────────────────────────────────────────────────────────────────────
  // HELPERS
  // ─────────────────────────────────────────────────────────────────────────
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function nl2br(s) {
    return esc(s).replace(/\n/g, '<br>');
  }

  function priorityBadge(p) {
    const cls = 'badge badge-' + (p || '').toLowerCase();
    return `<span class="${cls}">${esc(p)}</span>`;
  }

  function riskBadge(r) {
    if (r === '高') return '<span class="risk-high">高</span>';
    if (r === '中') return '<span class="risk-mid">中</span>';
    if (r === '低') return '<span class="risk-low">低</span>';
    return esc(r);
  }

  // ─────────────────────────────────────────────────────────────────────────
  // RENDER TABLES
  // ─────────────────────────────────────────────────────────────────────────
  function renderTable(containerId, columns, rows, fieldMap, options = {}) {
    const container = document.getElementById(containerId);
    if (!container) return;

    const { filterBar, badgeFields = [], riskFields = [], optField } = options;

    let html = '';

    // Filter bar
    if (filterBar) {
      html += '<div class="filter-bar">';
      filterBar.forEach(f => {
        html += `<label>${esc(f.label)}</label>`;
        if (f.type === 'select') {
          html += `<select id="${f.id}" onchange="filterTable('${containerId}')"><option value="">全部</option>`;
          (f.options || []).forEach(o => html += `<option>${esc(o)}</option>`);
          html += '</select>';
        } else {
          html += `<input type="text" id="${f.id}" placeholder="关键词..." oninput="filterTable('${containerId}')">`;
        }
      });
      html += `<span class="filter-count" id="${containerId}-count"></span>`;
      html += '</div>';
    }

    // Table
    html += `<div class="table-wrap"><table id="${containerId}-table"><thead><tr>`;
    columns.forEach(c => html += `<th>${esc(c)}</th>`);
    html += '</tr></thead><tbody>';

    rows.forEach(row => {
      html += '<tr>';
      fieldMap.forEach((field, i) => {
        let val = row[field] || '';
        const colName = columns[i];

        if (badgeFields.includes(field) || badgeFields.includes(colName)) {
          val = priorityBadge(val);
        } else if (riskFields.includes(field) || riskFields.includes(colName)) {
          val = riskBadge(val);
        } else if (optField && field === optField) {
          val = `<span style="white-space:pre-wrap;line-height:1.6">${nl2br(val)}</span>`;
        } else {
          val = esc(val);
        }
        html += `<td>${val}</td>`;
      });
      html += '</tr>';
    });

    html += '</tbody></table></div>';
    container.innerHTML = html;

    // Initialize filter
    if (filterBar) {
      buildFilterOptions(containerId);
      initCount(containerId);
    }
  }

  function renderRequirements() {
    const req = DATA.requirements;
    if (!req) return;

    const container = document.getElementById('requirements');
    let html = '';

    // 模块与功能点
    if (req.modules && req.modules.length) {
      html += '<h3 style="margin:0 0 12px;font-size:16px;color:var(--text)">模块与功能点</h3>';
      html += '<div class="table-wrap"><table><thead><tr><th>一级模块</th><th>二级模块</th><th>功能点</th><th>功能描述</th></tr></thead><tbody>';
      req.modules.forEach(m => {

  function getUniqueValues(arr, field) {
    return [...new Set(arr.map(item => item[field]).filter(Boolean))].sort();
  }

  // ─────────────────────────────────────────────────────────────────────────
  // TABS
  // ─────────────────────────────────────────────────────────────────────────
  const tabs = document.querySelectorAll(".tab");
  const sections = document.querySelectorAll("section");
  tabs.forEach(tab => {
    tab.addEventListener("click", () => {
      tabs.forEach(t => t.classList.remove("active"));
      sections.forEach(s => s.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById(tab.dataset.tab).classList.add("active");
    });
  });

  // ─────────────────────────────────────────────────────────────────────────
  // FILTER
  // ─────────────────────────────────────────────────────────────────────────
  function getFilterConfig(sectionId) {
    const table = document.querySelector(`#${sectionId}-table`);
    if (!table) return null;

    const headers = Array.from(table.rows[0].cells).map(c => c.textContent.trim());
    const cfg = { sectionId, search: `${sectionId}-search`, count: `${sectionId}-count` };

    // Auto-detect columns
    headers.forEach((h, i) => {
      if (h === '一级模块') cfg.moduleCol = i;
      if (h === '分类') cfg.categoryCol = i;
      if (h === '用例优先级' || h === '优先级') cfg.priorityCol = i;
      if (h === '评审角色') cfg.roleCol = i;
      if (h === '缺陷类型') cfg.defectCol = i;
    });

    // Auto-detect filters
    const section = document.getElementById(sectionId);
    if (section) {
      const selects = section.querySelectorAll('.filter-bar select');
      selects.forEach(sel => {
        if (sel.id.includes('module')) cfg.moduleFilter = sel.id;
        if (sel.id.includes('category')) cfg.categoryFilter = sel.id;
        if (sel.id.includes('priority')) cfg.priorityFilter = sel.id;
        if (sel.id.includes('role')) cfg.roleFilter = sel.id;
        if (sel.id.includes('defect')) cfg.defectFilter = sel.id;
      });
    }

    return cfg;
  }

  function getCellText(cell) {
    if (!cell) return "";
    return (cell.dataset.rawValue || cell.textContent).trim();
  }

  function filterTable(sectionId) {
    const cfg = getFilterConfig(sectionId);
    if (!cfg) return;

    const table = document.getElementById(`${sectionId}-table`);
    if (!table) return;

    const module = cfg.moduleFilter ? document.getElementById(cfg.moduleFilter).value : "";
    const category = cfg.categoryFilter ? document.getElementById(cfg.categoryFilter).value : "";
    const priority = cfg.priorityFilter ? document.getElementById(cfg.priorityFilter).value : "";
    const role = cfg.roleFilter ? document.getElementById(cfg.roleFilter).value : "";
    const defect = cfg.defectFilter ? document.getElementById(cfg.defectFilter).value : "";
    const keyword = document.getElementById(cfg.search).value.trim().toLowerCase();

    let visible = 0;
    Array.from(table.rows).slice(1).forEach(row => {
      if (row.classList.contains("row-deleted")) { row.classList.add("hidden"); return; }
      let show = true;
      if (module && cfg.moduleCol !== undefined && getCellText(row.cells[cfg.moduleCol]) !== module) show = false;
      if (category && cfg.categoryCol !== undefined && getCellText(row.cells[cfg.categoryCol]) !== category) show = false;
      if (priority && cfg.priorityCol !== undefined && getCellText(row.cells[cfg.priorityCol]).toUpperCase() !== priority.toUpperCase()) show = false;
      if (role && cfg.roleCol !== undefined && getCellText(row.cells[cfg.roleCol]) !== role) show = false;
      if (defect && cfg.defectCol !== undefined && getCellText(row.cells[cfg.defectCol]) !== defect) show = false;
      if (keyword && !row.textContent.toLowerCase().includes(keyword)) show = false;
      row.classList.toggle("hidden", !show);
      if (show) visible++;
    });

    const total = table.rows.length - 1 - table.querySelectorAll("tr.row-deleted").length;
    const countEl = document.getElementById(cfg.count);
    if (countEl) countEl.textContent = `显示 ${visible} / ${total} 条`;
  }

  function buildFilterOptions(sectionId) {
    const table = document.getElementById(`${sectionId}-table`);
    if (!table) return;

    const section = document.getElementById(sectionId);
    if (!section) return;

    const selects = section.querySelectorAll('.filter-bar select');
    selects.forEach(sel => {
      if (sel.options.length > 1) return; // Already has options

      const headers = Array.from(table.rows[0].cells).map(c => c.textContent.trim());
      let colIdx = -1;

      if (sel.id.includes('module')) colIdx = headers.indexOf('一级模块');
      if (sel.id.includes('category')) colIdx = headers.indexOf('分类');
      if (sel.id.includes('defect')) colIdx = headers.indexOf('缺陷类型');

      if (colIdx >= 0) {
        const vals = new Set();
        Array.from(table.rows).slice(1).forEach(row => {
          const cell = row.cells[colIdx];
          if (cell) vals.add(getCellText(cell));
        });
        vals.forEach(v => {
          if (!v) return;
          const opt = document.createElement("option");
          opt.value = v;
          opt.textContent = v;
          sel.appendChild(opt);
        });
      }
    });
  }

  function initCount(sectionId) {
    const cfg = getFilterConfig(sectionId);
    if (!cfg) return;
    const table = document.getElementById(`${sectionId}-table`);
    if (!table) return;
    const countEl = document.getElementById(cfg.count);
    if (countEl) countEl.textContent = `共 ${table.rows.length - 1} 条`;
  }

  // ─────────────────────────────────────────────────────────────────────────
  // SNAPSHOT (for reset)
  // ─────────────────────────────────────────────────────────────────────────
  function snapshotTable(tableId) {
    const table = document.getElementById(tableId);
    if (!table) return;
    snapshots[tableId] = Array.from(table.rows).map(row =>
      Array.from(row.cells).map(cell => {
        if (cell.classList.contains("col-action")) return "__ACTION__";
        return cell.dataset.rawValue !== undefined ? cell.dataset.rawValue : cell.textContent.trim();
      })
    );
  }

  function snapshotAllTables() {
    document.querySelectorAll("table[id]").forEach(t => snapshotTable(t.id));
  }

  // ─────────────────────────────────────────────────────────────────────────
  // EDIT MODE
  // ─────────────────────────────────────────────────────────────────────────
  function toggleEdit() {
    editMode = !editMode;
    const btn = document.getElementById("btn-edit");
    const addBtn = document.getElementById("btn-add");
    const resetBtn = document.getElementById("btn-reset");
    btn.textContent = editMode ? "✔ 完成编辑" : "✏ 开启编辑";
    btn.className = editMode ? "button" : "secondary";
    addBtn.disabled = !editMode;
    resetBtn.disabled = !editMode;

    document.querySelectorAll("table tbody tr:not(.row-deleted) td:not(.col-action), table tr:not(:first-child) td:not(.col-action)").forEach(td => {
      if (editMode) {
        td.setAttribute("contenteditable", "true");
        td.dataset.placeholder = "输入内容…";
        const badge = td.querySelector(".badge");
        if (badge) {
          td.dataset.rawValue = badge.textContent.trim();
          td.textContent = badge.textContent.trim();
        }
        td.addEventListener("input", onCellInput);
      } else {
        td.removeAttribute("contenteditable");
        td.removeEventListener("input", onCellInput);
      }
    });

    document.querySelectorAll(".col-action").forEach(el => {
      el.style.display = editMode ? "" : "none";
    });

    if (!editMode) {
      renderPriorityBadges();
      updateEditBadge();
    }

    toast(editMode ? "编辑模式已开启，点击单元格直接修改" : "编辑已完成");
  }

  function onCellInput(e) {
    editCount++;
    updateEditBadge();
  }

  function updateEditBadge() {
    const badge = document.getElementById("edit-badge");
    const text = document.getElementById("edit-badge-text");
    let changed = 0;
    document.querySelectorAll("table tr.row-new").forEach(() => changed++);
    document.querySelectorAll("table tr.row-deleted").forEach(() => changed++);
    if (editMode || changed > 0) {
      badge.classList.add("visible");
      text.textContent = changed > 0 ? `已修改 ${changed} 行` : "编辑中";
    } else {
      badge.classList.remove("visible");
    }
  }

  // ─────────────────────────────────────────────────────────────────────────
  // ADD ROW
  // ─────────────────────────────────────────────────────────────────────────
  function addRow() {
    const activeSection = document.querySelector("section.active");
    if (!activeSection) return;
    const table = activeSection.querySelector("table");
    if (!table) return;
    const headerRow = table.rows[0];
    const colCount = headerRow ? headerRow.cells.length : 0;
    const tr = document.createElement("tr");
    tr.classList.add("row-new");
    for (let i = 0; i < colCount; i++) {
      const td = document.createElement("td");
      if (headerRow.cells[i] && headerRow.cells[i].classList.contains("col-action")) {
        td.className = "col-action";
        td.innerHTML = buildRowActionBtns();
      } else {
        td.setAttribute("contenteditable", "true");
        td.dataset.placeholder = "输入内容…";
        td.addEventListener("input", onCellInput);
      }
      tr.appendChild(td);
    }
    table.tBodies[0] ? table.tBodies[0].appendChild(tr) : table.appendChild(tr);
    updateEditBadge();
    toast("已新增一行，请填写内容");
  }

  function buildRowActionBtns() {
    return `<button class="btn-row del" title="删除此行" onclick="deleteRow(this)">🗑</button>`;
  }

  function deleteRow(btn) {
    const tr = btn.closest("tr");
    if (tr.classList.contains("row-new")) {
      tr.remove();
    } else {
      tr.classList.add("row-deleted");
      tr.querySelectorAll("td:not(.col-action)").forEach(td => td.removeAttribute("contenteditable"));
      btn.outerHTML = `<button class="btn-row restore" title="恢复此行" onclick="restoreRow(this)">↩</button>`;
    }
    updateEditBadge();
    const sectionId = tr.closest("section") ? tr.closest("section").id : null;
    if (sectionId) filterTable(sectionId);
  }

  function restoreRow(btn) {
    const tr = btn.closest("tr");
    tr.classList.remove("row-deleted");
    tr.querySelectorAll("td:not(.col-action)").forEach(td => {
      if (editMode) td.setAttribute("contenteditable", "true");
    });
    btn.outerHTML = buildRowActionBtns();
    updateEditBadge();
  }

  // ─────────────────────────────────────────────────────────────────────────
  // RESET ALL EDITS
  // ─────────────────────────────────────────────────────────────────────────
  function resetEdits() {
    if (!confirm("确认撤销所有编辑，恢复到初始状态？")) return;
    document.querySelectorAll("tr.row-new").forEach(tr => tr.remove());
    document.querySelectorAll("tr.row-deleted").forEach(tr => {
      tr.classList.remove("row-deleted");
      tr.querySelectorAll("td:not(.col-action)").forEach(td => {
        if (editMode) td.setAttribute("contenteditable", "true");
      });
      const restoreBtn = tr.querySelector(".btn-row.restore");
      if (restoreBtn) restoreBtn.outerHTML = buildRowActionBtns();
    });
    Object.entries(snapshots).forEach(([tableId, rows]) => {
      const table = document.getElementById(tableId);
      if (!table) return;
      rows.forEach((cells, rIdx) => {
        const row = table.rows[rIdx];
        if (!row) return;
        cells.forEach((val, cIdx) => {
          const cell = row.cells[cIdx];
          if (!cell || val === "__ACTION__") return;
          cell.textContent = val;
          if (/^P[0-3]$/i.test(val)) cell.dataset.rawValue = val.toUpperCase();
          else delete cell.dataset.rawValue;
        });
      });
    });
    renderPriorityBadges();
    editCount = 0;
    updateEditBadge();
    toast("已恢复到初始状态");
  }

  // ─────────────────────────────────────────────────────────────────────────
  // PRIORITY BADGES
  // ─────────────────────────────────────────────────────────────────────────
  function renderPriorityBadges(root) {
    (root || document).querySelectorAll("table td:not(.col-action)").forEach(td => {
      if (td.querySelector(".badge")) return;
      const text = td.textContent.trim().toUpperCase();
      if (/^P[0-3]$/.test(text)) {
        const cls = "badge badge-" + text.toLowerCase();
        td.dataset.rawValue = text;
        td.innerHTML = `<span class="${cls}">${text}</span>`;
      }
    });
  }

  // ─────────────────────────────────────────────────────────────────────────
  // XLSX GENERATION (pure JS, Open XML, no dependencies)
  // ─────────────────────────────────────────────────────────────────────────
  function tableToSheetData(tableEl) {
    if (!tableEl) return { columns: [], rows: [] };
    const allRows = Array.from(tableEl.rows).filter(r => !r.classList.contains("row-deleted") && !r.classList.contains("hidden") || r === tableEl.rows[0]);
    const headerCells = Array.from(allRows[0].cells).filter(c => !c.classList.contains("col-action"));
    const columns = headerCells.map(c => c.textContent.trim());
    const rows = [];
    for (let i = 1; i < allRows.length; i++) {
      const row = allRows[i];
      if (row.classList.contains("row-deleted")) continue;
      const dataCells = Array.from(row.cells).filter(c => !c.classList.contains("col-action"));
      const rowData = {};
      dataCells.forEach((cell, ci) => {
        rowData[columns[ci]] = (cell.dataset.rawValue !== undefined ? cell.dataset.rawValue : cell.textContent).trim();
      });
      rows.push(rowData);
    }
    return { columns, rows };
  }

  function escXml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&apos;");
  }

  function colLetter(idx) {
    let name = ""; idx++;
    while (idx) { const r = (idx-1)%26; name = String.fromCharCode(65+r)+name; idx=Math.floor((idx-1)/26); }
    return name;
  }

  function buildSheetXml(columns, rows) {
    const styles = window.__XLSX_STYLES__ || {};
    const headerFill = styles.header_fill || "FFD6E4F0";
    const priorityColors = styles.priority_colors || { P0: "FFFFC7CE", P1: "FFFFEB9C", P2: "FFFFFFCC" };
    const borderColor = styles.border_color || "FFD9DEE8";

    const STYLE_HEADER = 1, STYLE_WRAP = 2;
    const PRIORITY_STYLES = {};
    let styleIdx = 3;
    Object.entries(priorityColors).forEach(([p, color]) => {
      if (color) PRIORITY_STYLES[p] = styleIdx++;
    });

    const PRIORITY_COLS = new Set(["用例优先级", "优先级", "priority"]);

    function cellXml(val, ri, ci, si) {
      const ref = colLetter(ci)+ri;
      const text = escXml(String(val==null?"":val).replace(/\r\n/g,"\n").replace(/\r/g,"\n"));
      return `<c r="${ref}" t="inlineStr" s="${si}"><is><t xml:space="preserve">${text}</t></is></c>`;
    }

    const priorityColIndices = new Set(columns.reduce((a,c,i)=>PRIORITY_COLS.has(c)?[...a,i]:a,[]));
    const xmlRows = [];

    const hdr = columns.map((c,i)=>cellXml(c,1,i,STYLE_HEADER)).join("");
    xmlRows.push(`<row r="1">${hdr}</row>`);

    rows.forEach((row,ri) => {
      const vals = columns.map(c=>typeof row==="object"&&!Array.isArray(row)?row[c]??"":row[c]??"");
      const cells = vals.map((v,ci)=>{
        let si = STYLE_WRAP;
        if (priorityColIndices.has(ci)) si = PRIORITY_STYLES[String(v).trim().toUpperCase()] ?? STYLE_WRAP;
        return cellXml(v, ri+2, ci, si);
      }).join("");
      xmlRows.push(`<row r="${ri+2}">${cells}</row>`);
    });

    const lastCol = colLetter(Math.max(columns.length-1,0));
    const lastRow = Math.max(rows.length+1,1);
    const dim = columns.length ? `A1:${lastCol}${lastRow}` : "A1";

    const colWidths = columns.map((c,ci)=>{
      const maxLen = Math.max(c.length, ...rows.map(r=>{
        const v = typeof r==="object"&&!Array.isArray(r)?r[c]??"":r[ci]??"";
        return String(v).length;
      }));
      return Math.min(Math.max(maxLen*1.2,8),60);
    });
    const colsXml = colWidths.map((w,i)=>`<col min="${i+1}" max="${i+1}" width="${w.toFixed(1)}" bestFit="1" customWidth="1"/>`).join("");

    return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
      +'<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" '
      +'xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">'
      +`<dimension ref="${dim}"/>`
      +'<sheetViews><sheetView workbookViewId="0"/></sheetViews>'
      +'<sheetFormatPr defaultRowHeight="15"/>'
      +`<cols>${colsXml}</cols>`
      +`<sheetData>${xmlRows.join("")}</sheetData>`
      +'</worksheet>';
  }

  function buildStylesXml() {
    const styles = window.__XLSX_STYLES__ || {};
    const headerFill = styles.header_fill || "FFD6E4F0";
    const priorityColors = styles.priority_colors || { P0: "FFFFC7CE", P1: "FFFFEB9C", P2: "FFFFFFCC" };
    const borderColor = styles.border_color || "FFD9DEE8";

    const fills = ['<fill><patternFill patternType="none"/></fill>',
      '<fill><patternFill patternType="gray125"/></fill>',
      `<fill><patternFill patternType="solid"><fgColor rgb="${headerFill}"/></patternFill></fill>`];

    Object.values(priorityColors).forEach(color => {
      if (color) fills.push(`<fill><patternFill patternType="solid"><fgColor rgb="${color}"/></patternFill></fill>`);
    });

    const cellXfs = [
      '<xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/>',
      `<xf numFmtId="0" fontId="1" fillId="2" borderId="1" xfId="0" applyFont="1" applyFill="1" applyBorder="1" applyAlignment="1"><alignment wrapText="1" vertical="center"/></xf>`,
      '<xf numFmtId="0" fontId="0" fillId="0" borderId="1" xfId="0" applyBorder="1" applyAlignment="1"><alignment wrapText="1" vertical="top"/></xf>'
    ];

    Object.values(priorityColors).forEach((color, i) => {
      if (color) cellXfs.push(`<xf numFmtId="0" fontId="0" fillId="${i+3}" borderId="1" xfId="0" applyFill="1" applyBorder="1" applyAlignment="1"><alignment wrapText="1" vertical="top"/></xf>`);
    });

    return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
      +'<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'
      +'<fonts count="2"><font><sz val="11"/><name val="Calibri"/></font><font><b/><sz val="11"/><name val="Calibri"/></font></fonts>'
      +`<fills count="${fills.length}">${fills.join('')}</fills>`
      +'<borders count="2"><border/><border>'
      +`<left style="thin"><color rgb="${borderColor}"/></left><right style="thin"><color rgb="${borderColor}"/></right>`
      +`<top style="thin"><color rgb="${borderColor}"/></top><bottom style="thin"><color rgb="${borderColor}"/></bottom>`
      +'</border></borders>'
      +'<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>'
      +`<cellXfs count="${cellXfs.length}">${cellXfs.join('')}</cellXfs></styleSheet>`;
  }

  // ── ZIP builder (no dependency) ────────────────────────────────────────
  function strToU8(str) { return new TextEncoder().encode(str); }
  function u8concat(arrays) {
    const total = arrays.reduce((s,a)=>s+a.length,0);
    const out = new Uint8Array(total);
    let offset=0;
    arrays.forEach(a=>{out.set(a,offset);offset+=a.length;});
    return out;
  }

  function crc32(data) {
    const table = crc32.table || (crc32.table = (()=>{
      const t=new Uint32Array(256);
      for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=c&1?(0xEDB88320^(c>>>1)):(c>>>1);t[i]=c;}
      return t;
    })());
    let crc=0xFFFFFFFF;
    for(let i=0;i<data.length;i++) crc=table[(crc^data[i])&0xFF]^(crc>>>8);
    return (crc^0xFFFFFFFF)>>>0;
  }

  function dosTime() {
    const d=new Date();
    return ((d.getFullYear()-1980)<<25|(d.getMonth()+1)<<21|d.getDate()<<16|d.getHours()<<11|d.getMinutes()<<5|Math.floor(d.getSeconds()/2))>>>0;
  }

  function u32le(n){const b=new Uint8Array(4);new DataView(b.buffer).setUint32(0,n,true);return b;}
  function u16le(n){const b=new Uint8Array(2);new DataView(b.buffer).setUint16(0,n,true);return b;}

  function zipStore(files) {
    const entries=[];
    let offset=0;
    const dt=dosTime();
    const localHeaders=[];

    files.forEach(f=>{
      const nameBytes=strToU8(f.name);
      const crc=crc32(f.data);
      const size=f.data.length;
      const lh=u8concat([
        new Uint8Array([0x50,0x4B,0x03,0x04]),
        u16le(20), u16le(0), u16le(0),
        u16le(dt&0xFFFF), u16le(dt>>>16),
        u32le(crc),
        u32le(size), u32le(size),
        u16le(nameBytes.length), u16le(0),
        nameBytes,
      ]);
      localHeaders.push(lh);
      entries.push({nameBytes,crc,size,offset});
      offset+=lh.length+size;
    });

    const cdParts=[];
    entries.forEach((e,i)=>{
      const dt2=dosTime();
      cdParts.push(u8concat([
        new Uint8Array([0x50,0x4B,0x01,0x02]),
        u16le(20), u16le(20), u16le(0), u16le(0),
        u16le(dt2&0xFFFF), u16le(dt2>>>16),
        u32le(e.crc), u32le(e.size), u32le(e.size),
        u16le(e.nameBytes.length), u16le(0), u16le(0),
        u16le(0), u16le(0), u32le(0),
        u32le(e.offset),
        e.nameBytes,
      ]));
    });
    const cd=u8concat(cdParts);
    const cdOffset=offset;
    const eocd=u8concat([
      new Uint8Array([0x50,0x4B,0x05,0x06]),
      u16le(0),u16le(0),
      u16le(files.length),u16le(files.length),
      u32le(cd.length), u32le(cdOffset),
      u16le(0),
    ]);

    const parts=[];
    files.forEach((f,i)=>{parts.push(localHeaders[i]);parts.push(f.data);});
    parts.push(cd); parts.push(eocd);
    return u8concat(parts);
  }

  // ── Main download ──────────────────────────────────────────────────────
  function downloadXlsx() {
    const sheetDefs = [
      { id: "raw",       name: "原始用例集" },
      { id: "review",    name: "AI评审详情" },
      { id: "optimized", name: "优化后用例集" },
    ];

    const files = [];
    const sheetFiles = [];
    sheetDefs.forEach(({id, name}, idx) => {
      const table = document.getElementById(`${id}-table`);
      if (!table) return;
      const { columns, rows } = tableToSheetData(table);
      const xml = buildSheetXml(columns, rows);
      sheetFiles.push({ sheetName: name, idx: idx+1, xml });
    });

    const workbookSheetsXml = sheetFiles.map(s=>`<sheet name="${escXml(s.sheetName)}" sheetId="${s.idx}" r:id="rId${s.idx}"/>`).join("");
    const workbookRelsXml = sheetFiles.map(s=>`<Relationship Id="rId${s.idx}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${s.idx}.xml"/>`).join("")
      + `<Relationship Id="rId${sheetFiles.length+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>`;
    const contentOverrides = sheetFiles.map(s=>`<Override PartName="/xl/worksheets/sheet${s.idx}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`).join("");

    files.push({ name: "[Content_Types].xml", data: strToU8(
      '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
      +'<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'
      +'<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>'
      +'<Default Extension="xml" ContentType="application/xml"/>'
      +'<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>'
      +'<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>'
      +contentOverrides+'</Types>'
    )});
    files.push({ name: "_rels/.rels", data: strToU8(
      '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
      +'<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
      +'<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>'
      +'</Relationships>'
    )});
    files.push({ name: "xl/workbook.xml", data: strToU8(
      '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
      +'<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" '
      +'xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">'
      +`<sheets>${workbookSheetsXml}</sheets></workbook>`
    )});
    files.push({ name: "xl/_rels/workbook.xml.rels", data: strToU8(
      '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
      +'<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
      +workbookRelsXml+'</Relationships>'
    )});
    files.push({ name: "xl/styles.xml", data: strToU8(buildStylesXml()) });
    sheetFiles.forEach(s => {
      files.push({ name: `xl/worksheets/sheet${s.idx}.xml`, data: strToU8(s.xml) });
    });

    const zipBytes = zipStore(files);
    const blob = new Blob([zipBytes], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "测试用例集_" + new Date().toLocaleDateString("sv-SE") + ".xlsx";
    a.click();
    URL.revokeObjectURL(a.href);
    toast("Excel 已生成并下载（含所有编辑内容）");
  }

  // ─────────────────────────────────────────────────────────────────────────
  // COPY
  // ─────────────────────────────────────────────────────────────────────────
  async function copyOptimized() {
    const table = document.getElementById("optimized-table");
    if (!table) return;
    const rows = Array.from(table.rows)
      .filter(row => !row.classList.contains("hidden") && !row.classList.contains("row-deleted"))
      .map(row =>
        Array.from(row.cells)
          .filter(c => !c.classList.contains("col-action"))
          .map(cell => (cell.dataset.rawValue||cell.innerText).trim().replace(/\s+/g," "))
          .join("\t")
      ).join("\n");
    await navigator.clipboard.writeText(rows);
    toast("已复制优化后用例（含当前筛选 + 编辑结果）");
  }

  // ─────────────────────────────────────────────────────────────────────────
  // TOAST
  // ─────────────────────────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>el.classList.remove("show"), 2600);
  }

  // ─────────────────────────────────────────────────────────────────────────
  // ADD ACTION COLUMN TO TABLES (hidden until edit mode)
  // ─────────────────────────────────────────────────────────────────────────
  function injectActionColumns() {
    document.querySelectorAll("section table").forEach(table => {
      const th = document.createElement("th");
      th.className = "col-action";
      th.textContent = "操作";
      th.style.display = "none";
      if (table.rows[0]) table.rows[0].appendChild(th);
      Array.from(table.rows).slice(1).forEach(row => {
        const td = document.createElement("td");
        td.className = "col-action";
        td.style.display = "none";
        td.innerHTML = buildRowActionBtns();
        row.appendChild(td);
      });
    });
  }

  // ─────────────────────────────────────────────────────────────────────────
  // INIT
  // ─────────────────────────────────────────────────────────────────────────
  function init() {
    // Update title from data
    if (DATA.meta) {
      if (DATA.meta.title) document.getElementById('report-title').textContent = DATA.meta.title;
      if (DATA.meta.subtitle) document.getElementById('report-subtitle').textContent = DATA.meta.subtitle;
    }

    // Render all sections
    renderRequirements();
    renderRawCases();
    renderReviewFindings();
    renderOptimizedCases();
    renderReport();

    // Initialize interactions
    renderPriorityBadges();
    injectActionColumns();
    snapshotAllTables();
  }

  // Run init when data is available
  if (Object.keys(DATA).length > 0) {
    init();
  }
  </script>
</body>
